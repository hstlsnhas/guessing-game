<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Program Tebak-Tebakan</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap');

  :root {
    --green: #00ff88;
    --green-dim: #00cc66;
    --green-glow: rgba(0,255,136,0.18);
    --bg: #0a0f0a;
    --panel: #0d150d;
    --border: #1a3a1a;
    --text: #c8ffd4;
    --dim: #4a7a52;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  .terminal {
    width: 100%;
    max-width: 680px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    box-shadow: 0 0 40px rgba(0,255,136,0.06), 0 0 0 1px #0d1f0d;
    overflow: hidden;
  }

  .title-bar {
    background: #0d1f0d;
    border-bottom: 1px solid var(--border);
    padding: 10px 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot.r { background: #3a1a1a; }
  .dot.y { background: #2e2a0a; }
  .dot.g { background: #0a2a0a; border: 1px solid #1a4a1a; }
  .title-label {
    font-family: 'VT323', monospace;
    color: var(--dim);
    font-size: 14px;
    margin-left: 8px;
    letter-spacing: 2px;
  }

  .screen {
    padding: 28px 24px 32px;
    min-height: 420px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .box {
    border: 1px solid var(--border);
    padding: 16px 20px;
    background: rgba(0,255,136,0.02);
    line-height: 1.7;
  }

  .box-title {
    font-family: 'VT323', monospace;
    font-size: 22px;
    color: var(--green);
    text-align: center;
    letter-spacing: 3px;
    text-shadow: 0 0 12px var(--green-glow);
    margin-bottom: 4px;
  }

  .box-sub {
    font-size: 12px;
    color: var(--dim);
    text-align: center;
    letter-spacing: 1px;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 12px 0;
  }

  .menu-item {
    display: block;
    width: 100%;
    text-align: left;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    padding: 12px 16px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .menu-item:hover, .menu-item:focus {
    background: var(--green-glow);
    border-color: var(--green-dim);
    color: var(--green);
    outline: none;
    box-shadow: 0 0 12px rgba(0,255,136,0.1);
  }
  .menu-item .prefix { color: var(--green); margin-right: 10px; }

  .clue-box {
    border: 1px dashed var(--border);
    padding: 12px 16px;
    font-size: 13px;
    color: var(--text);
    line-height: 1.8;
  }
  .clue-label {
    color: var(--green);
    font-size: 11px;
    letter-spacing: 2px;
    margin-bottom: 6px;
  }
  .clue-text { color: var(--text); }

  .attempts {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .attempt-dot {
    width: 10px; height: 10px; border-radius: 50%;
    border: 1px solid var(--green-dim);
    background: var(--green-dim);
    transition: all 0.3s;
  }
  .attempt-dot.used { background: transparent; border-color: var(--border); }
  .attempt-label { font-size: 11px; color: var(--dim); margin-left: 6px; letter-spacing: 1px; }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: stretch;
  }
  .prompt-label { color: var(--green); font-size: 13px; white-space: nowrap; align-self: center; }

  input[type="text"], input[type="number"] {
    flex: 1;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--green-dim);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    font-size: 15px;
    padding: 6px 2px;
    outline: none;
    letter-spacing: 2px;
  }
  input[type="text"]::placeholder, input[type="number"]::placeholder {
    color: var(--dim);
    font-size: 12px;
  }

  .btn {
    background: transparent;
    border: 1px solid var(--green-dim);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    padding: 8px 18px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s;
  }
  .btn:hover { background: var(--green-glow); box-shadow: 0 0 10px rgba(0,255,136,0.15); }
  .btn.big { width: 100%; padding: 12px; font-size: 14px; letter-spacing: 2px; margin-top: 8px; }

  .feedback {
    border-left: 2px solid var(--green);
    padding: 10px 16px;
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
  }
  .feedback.wrong { border-color: #aa3333; color: #ff8888; }
  .feedback.right { border-color: var(--green); color: var(--green); }

  .number-hint {
    font-size: 32px;
    font-family: 'VT323', monospace;
    color: var(--green);
    text-align: center;
    text-shadow: 0 0 20px var(--green-glow);
    letter-spacing: 8px;
    padding: 8px 0;
  }

  .range-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 8px 0 4px;
    position: relative;
    overflow: visible;
  }
  .range-fill {
    position: absolute;
    height: 100%;
    background: var(--green-dim);
    border-radius: 2px;
    transition: all 0.4s;
  }
  .range-labels {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--dim);
    margin-top: 4px;
  }

  .mitos-btns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 4px;
  }
  .mitos-btn {
    padding: 14px;
    font-size: 15px;
    letter-spacing: 2px;
    font-family: 'VT323', monospace;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
  }
  .mitos-btn:hover { border-color: var(--green-dim); color: var(--green); background: var(--green-glow); }

  .scanline {
    pointer-events: none;
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px);
    z-index: 999;
  }

  .blink { animation: blink 1.1s step-end infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  .fade-in { animation: fadeIn 0.35s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>
<div class="scanline"></div>
<div class="terminal">
  <div class="title-bar">
    <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
    <span class="title-label">PROGRAM TEBAK-TEBAKAN — NIM 2102839</span>
  </div>
  <div class="screen" id="screen"></div>
</div>

<script>
// ─── DATA ───────────────────────────────────────────────
const hewan = [
  { nama:"Harimau", clues:["Berkaki empat, pemakan daging","Tubuh bercorak belang, habitat hutan","Berawalan huruf H"] },
  { nama:"Paus",    clues:["Mamalia laut","Ukuran tubuh besar, seringkali terdampar","Berawalan huruf P"] },
  { nama:"Kelinci", clues:["Wortel makanan favoritnya","Berbulu lebat, telinga panjang","Berawalan huruf K"] },
  { nama:"Kuda",    clues:["Biasa digunakan untuk transportasi","Berkaki empat, bisa berlari kencang","Berawalan huruf K"] },
  { nama:"Ikan",    clues:["Hidup di air, bernapas dengan insang","Bersisik dan berenang","Berawalan huruf I"] },
  { nama:"Ayam",    clues:["Bisa berkokok di pagi hari","Berbulu, berkaki dua","Berawalan huruf A"] },
  { nama:"Gajah",   clues:["Mamalia darat terbesar","Memiliki belalai panjang","Berawalan huruf G"] },
  { nama:"Buaya",   clues:["Reptil besar, hidup di rawa dan sungai","Kulitnya keras seperti baju zirah","Berawalan huruf B"] },
  { nama:"Kucing",  clues:["Hewan peliharaan populer, suka mengeong","Dapat melihat dalam gelap","Berawalan huruf K"] },
  { nama:"Zebra",   clues:["Herbivora dengan corak hitam-putih","Hidup di padang savana Afrika","Berawalan huruf Z"] },
  { nama:"Pinguin", clues:["Burung yang tidak bisa terbang, hidup di kutub","Warna tubuh hitam-putih, berjalan tegak","Berawalan huruf P"] },
  { nama:"Koala",   clues:["Marsupial asal Australia","Suka makan daun eukaliptus","Berawalan huruf K"] },
];

const makanan = [
  { soal:"Tempe berasal dari Jawa Tengah", fakta:1, penjelasan:"Tempe memang berasal dari Jawa, banyak sumber menyebutnya dari Jawa Tengah." },
  { soal:"Rendang masuk daftar makanan terenak versi CNN", fakta:1, penjelasan:"Rendang pernah dinobatkan sebagai makanan terenak di dunia oleh CNN Travel." },
  { soal:"Nasi goreng diciptakan di Belanda", fakta:2, penjelasan:"Nasi goreng adalah makanan asli Asia Tenggara, bukan berasal dari Belanda." },
  { soal:"Soto adalah makanan khas Jawa Barat", fakta:2, penjelasan:"Soto adalah masakan khas Indonesia secara umum, bukan khusus Jawa Barat." },
  { soal:"Gudeg berasal dari Yogyakarta", fakta:1, penjelasan:"Gudeg memang makanan khas Yogyakarta." },
  { soal:"Pempek adalah makanan khas Palembang", fakta:1, penjelasan:"Pempek berasal dari Palembang, Sumatera Selatan." },
  { soal:"Batagor merupakan singkatan dari Bakso Tahu Goreng", fakta:1, penjelasan:"Batagor memang singkatan dari Bakso Tahu Goreng." },
  { soal:"Bahan utama Kue Cucur adalah tepung beras dan gula merah", fakta:1, penjelasan:"Benar, bahan utama kue cucur adalah tepung beras dan gula merah." },
  { soal:"Kue Putu berasal dari Jawa Timur", fakta:1, penjelasan:"Kue Putu diciptakan sekitar tahun 1630 di Desa Wanamarta, Jawa Timur." },
  { soal:"Rempah utama untuk Seblak adalah Jahe", fakta:2, penjelasan:"Faktanya, rempah utama Seblak adalah kencur, bukan jahe." },
];

// ─── STATE ──────────────────────────────────────────────
let state = 'menu';
let gameMode = null;
let currentAnimal = null;
let animalAttempt = 0;
let currentFood = null;
let secretNumber = 0;
let numberLow = 1, numberHigh = 15;

const sc = document.getElementById('screen');
function render(html) {
  sc.innerHTML = `<div class="fade-in">${html}</div>`;
}

// ─── SCREENS ────────────────────────────────────────────
function showMenu() {
  state = 'menu';
  render(`
    <div class="box">
      <div class="box-title">✦ TEBAK-TEBAKAN ✦</div>
      <div class="box-sub">NIM 2102839 · HASTIALISNA HURUL AENI SETIAWAN</div>
    </div>
    <div>
      <div class="box-sub" style="margin-bottom:12px;letter-spacing:2px;">PILIH PERMAINAN</div>
      <button class="menu-item" onclick="startAnimal()"><span class="prefix">[1]</span> TEBAK NAMA HEWAN</button>
      <button class="menu-item" onclick="startFood()"><span class="prefix">[2]</span> TEBAK MITOS / FAKTA MAKANAN</button>
      <button class="menu-item" onclick="startNumber()"><span class="prefix">[3]</span> TEBAK ANGKA RAHASIA</button>
    </div>
  `);
}

// ── MODE 1: TEBAK HEWAN ─────────────────────────────────
function startAnimal() {
  currentAnimal = hewan[Math.floor(Math.random()*hewan.length)];
  animalAttempt = 0;
  showAnimalRound();
}

function showAnimalRound() {
  const a = currentAnimal;
  const clue = a.clues[animalAttempt];
  const dots = [0,1,2].map(i =>
    `<div class="attempt-dot${i < animalAttempt ? ' used' : ''}"></div>`
  ).join('');

  render(`
    <div class="box">
      <div class="box-title">TEBAK NAMA HEWAN</div>
    </div>
    <div class="clue-box">
      <div class="clue-label">PETUNJUK ${animalAttempt+1} / 3</div>
      <div class="clue-text">${clue}</div>
    </div>
    <div class="attempts">${dots}<span class="attempt-label">KESEMPATAN TERSISA: ${3-animalAttempt}</span></div>
    <div class="input-row">
      <span class="prompt-label">&gt;</span>
      <input id="inp" type="text" placeholder="Ketik jawaban..." autocomplete="off" onkeydown="if(event.key==='Enter')checkAnimal()">
      <button class="btn" onclick="checkAnimal()">JAWAB</button>
    </div>
  `);
  document.getElementById('inp').focus();
}

function checkAnimal() {
  const inp = document.getElementById('inp').value.trim();
  const answer = currentAnimal.nama.toLowerCase();
  if(inp.toLowerCase() === answer) {
    showResult(true, `JAWABANNYA ADALAH ${currentAnimal.nama.toUpperCase()}!`);
  } else {
    animalAttempt++;
    if(animalAttempt >= 3) {
      showResult(false, `JAWABANNYA ADALAH ${currentAnimal.nama.toUpperCase()}`);
    } else {
      showAnimalRound();
    }
  }
}

// ── MODE 2: MITOS/FAKTA ──────────────────────────────────
function startFood() {
  currentFood = makanan[Math.floor(Math.random()*makanan.length)];
  render(`
    <div class="box">
      <div class="box-title">MITOS / FAKTA MAKANAN</div>
    </div>
    <div class="clue-box">
      <div class="clue-label">PERNYATAAN</div>
      <div class="clue-text" style="font-size:15px;padding:8px 0">"${currentFood.soal}"</div>
    </div>
    <div class="mitos-btns">
      <button class="mitos-btn" onclick="checkFood(1)">✓ FAKTA</button>
      <button class="mitos-btn" onclick="checkFood(2)">✗ MITOS</button>
    </div>
  `);
}

function checkFood(ans) {
  const benar = ans === currentFood.fakta;
  const label = currentFood.fakta === 1 ? 'FAKTA' : 'MITOS';
  showResult(benar, `INI ADALAH <strong>${label}</strong>.<br><small>${currentFood.penjelasan}</small>`);
}

// ── MODE 3: TEBAK ANGKA ──────────────────────────────────
function startNumber() {
  secretNumber = Math.floor(Math.random()*15)+1;
  numberLow = 1; numberHigh = 15;
  showNumberRound();
}

function showNumberRound(hint='') {
  const pct = ((numberLow-1)/14)*100;
  const pct2 = ((numberHigh-1)/14)*100;
  render(`
    <div class="box">
      <div class="box-title">TEBAK ANGKA RAHASIA</div>
    </div>
    <div class="number-hint">1 — ? — 15</div>
    <div class="clue-box">
      <div class="clue-label">RENTANG TERSISA</div>
      <div class="range-bar">
        <div class="range-fill" style="left:${pct}%;width:${pct2-pct}%"></div>
      </div>
      <div class="range-labels"><span>${numberLow}</span><span>${numberHigh}</span></div>
    </div>
    ${hint ? `<div class="feedback ${hint.type}">${hint.msg}</div>` : ''}
    <div class="input-row">
      <span class="prompt-label">&gt;</span>
      <input id="ninp" type="number" min="1" max="15" placeholder="1–15" onkeydown="if(event.key==='Enter')checkNumber()">
      <button class="btn" onclick="checkNumber()">TEBAK</button>
    </div>
  `);
  document.getElementById('ninp').focus();
}

function checkNumber() {
  const v = parseInt(document.getElementById('ninp').value);
  if(!v || v<1 || v>15) return;
  if(v === secretNumber) {
    showResult(true, `ANGKA RAHASIANYA ADALAH <strong>${secretNumber}</strong>!`);
  } else if(v < secretNumber) {
    numberLow = Math.max(numberLow, v+1);
    showNumberRound({type:'wrong', msg:'⬆ Angkanya LEBIH BESAR dari tebakanmu.'});
  } else {
    numberHigh = Math.min(numberHigh, v-1);
    showNumberRound({type:'wrong', msg:'⬇ Angkanya LEBIH KECIL dari tebakanmu.'});
  }
}

// ── RESULT ───────────────────────────────────────────────
function showResult(win, msg) {
  render(`
    <div class="box">
      <div class="box-title" style="color:${win?'var(--green)':'#ff6666'}">${win ? '🎉 BENAR!' : '✗ GAGAL!'}</div>
    </div>
    <div class="feedback ${win?'right':'wrong'}" style="font-size:14px;line-height:2">${msg}</div>
    <div style="margin-top:8px">
      <button class="btn big" onclick="showMenu()">⟵ KEMBALI KE MENU</button>
    </div>
  `);
}

// ── INIT ─────────────────────────────────────────────────
showMenu();
</script>
</body>
</html>
